name: Knight Capital Advanced Guard

on: 
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  comprehensive-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Lấy mã nguồn (Checkout)
        uses: actions/checkout@v4 # Cập nhật version mới nhất v4
        with:
          fetch-depth: 0 # SonarCloud cần lịch sử commit đầy đủ

      - name: 2. Thiết lập Java JDK 17
        uses: actions/setup-java@v4 # Cập nhật version v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # LỚP BẢO VỆ 1: QUÉT NHANH (FAST FAIL)
      # Mục tiêu: Phát hiện ngay lập tức các từ khóa "nguy hiểm"
      - name: Layer 1 - Custom Script Scan (Keyword Check)
        run: |
          echo "🔍 Đang quét từ khóa nhạy cảm trong mã nguồn..."
          # Sử dụng grep để tìm hàm gây thảm họa. Nếu tìm thấy, exit 1 để dừng pipeline ngay.
          if grep -r "activatePowerPegMode" src/main/java; then
            echo "-------------------------------------------------------"
            echo "❌ CẢNH BÁO: Phát hiện hàm 'activatePowerPegMode' (Zombie Code)!"
            echo "Dừng Pipeline ngay lập tức để bảo vệ hệ thống."
            echo "-------------------------------------------------------"
            exit 1
          else
            echo "✅ Không phát hiện từ khóa nguy hiểm. Tiếp tục..."
          fi

      # LỚP BẢO VỆ 2: PHÂN TÍCH SÂU (SONARCLOUD)
      # Mục tiêu: Phát hiện mã chết, lỗi logic và lỗ hổng bảo mật.
      - name: Layer 2 - SonarCloud Analysis (Deep Scan)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Thay 'Tên_Project_Của_Bạn' bằng Project Key của bạn (ví dụ: khoagibel_knight-capital-demo)
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=khoagibel_knight-capital-demo

      # BƯỚC CUỐI: ĐÓNG GÓI (Chỉ chạy nếu 2 lớp trên đã PASS)
      - name: 3. Đóng gói sản phẩm (Build Artifact)
        run: mvn -B package --file pom.xml